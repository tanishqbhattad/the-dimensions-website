  {type:"Open Space",pts:[[312.03,233.78],[318.8,209.72],[294.77,202.85],[318.72,117.67],[356.83,157.74],[436.07,291.01],[405.29,401.23],[323.65,377.86],[360.31,247.58]],c:[367.6,273.33],a:918.64,color:"#92CC36",icon:"🌳"},

// Plot text rotation — computed from DXF edge angles
function plotRotation(edges) {
  let best = 0, bestD = 999;
  for (const e of edges) {
    let a = ((e.a % 360) + 360) % 360;
    let d = Math.min(Math.abs(a), Math.abs(a - 180), Math.abs(a - 360));
    if (d < bestD) { bestD = d; best = e.a; }
  }
  while (best > 90) best -= 180;
  while (best < -90) best += 180;
  return best;
}

const BOUNDARY = [[10,743.43],[165.16,191.8],[216.29,10],[318.72,117.67],[356.83,157.74],[436.07,291.01],[405.29,401.23],[397.16,430.1],[392.41,446.95],[387.67,463.8],[382.93,480.65],[378.18,497.48],[368.69,531.17],[348.35,603.37],[319.87,704.43],[285.58,826.15]];

const STATUS_CFG = {
  Available: { color: "#4ade80", label: "Available" },
  Sold:      { color: "#f87171", label: "Sold" },
  Hold:      { color: "#fbbf24", label: "On Hold" },
  Reserved:  { color: "#a78bfa", label: "Reserved" },
};
const ALL_STATUSES = Object.keys(STATUS_CFG);

/* ═══════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════ */
const p2s = (pts) => pts.map(p => p[0] + "," + p[1]).join(" ");

function initStatuses() {
  const m = {};
  PLOTS.forEach(p => {
    const r = Math.random();
    m[p.id] = r < 0.45 ? "Available" : r < 0.72 ? "Sold" : r < 0.86 ? "Hold" : "Reserved";
  });
  return m;
}

/* ═══════════════════════════════════════════
   COMPONENT
   ═══════════════════════════════════════════ */
function SpacerMap() {
  const [statuses, setStatuses] = useState(initStatuses);
  const [sel, setSel] = useState(null);
  const [hov, setHov] = useState(null);
  const [search, setSearch] = useState("");
  const [showSearch, setShowSearch] = useState(false);
  const [statusFilter, setStatusFilter] = useState(true);
  const [typesFilter, setTypesFilter] = useState(false);
  const [activeStatuses, setActiveStatuses] = useState(new Set(ALL_STATUSES));
  const [showInfra, setShowInfra] = useState(true);
  const [vb, setVb] = useState({ x: -110, y: -100, w: SVG_W * 1.5, h: SVG_H * 1.3 });
  const [isPan, setIsPan] = useState(false);
  const [panO, setPanO] = useState(null);
  const [infoPanel, setInfoPanel] = useState(null); // 'gallery' | 'info' | 'locate' | null
  const svgRef = useRef(null);

  // Max zoom-out bounds (50% more than content)
  const MAX_W = SVG_W * 1.5;
  const MAX_H = SVG_H * 1.5;
  const MIN_X = -(MAX_W - SVG_W) / 2;
  const MIN_Y = -(MAX_H - SVG_H) / 2;

  // Filtered plots
  const visIds = useMemo(() => {
    const s = new Set();
    PLOTS.forEach(p => {
      if (!activeStatuses.has(statuses[p.id])) return;
      s.add(p.id);
    });
    return s;
  }, [statuses, activeStatuses]);

  // Stats
  const stats = useMemo(() => {
    const s = {};
    ALL_STATUSES.forEach(k => { s[k] = 0; });
    Object.values(statuses).forEach(k => { s[k]++; });
    return s;
  }, [statuses]);

  // Zoom
  const onWheel = useCallback((e) => {
    e.preventDefault();
    const svg = svgRef.current;
    if (!svg) return;
    const rect = svg.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / rect.width;
    const my = (e.clientY - rect.top) / rect.height;
    const f = e.deltaY > 0 ? 1.12 : 0.89;
    setVb(v => {
      const nw = Math.min(MAX_W, Math.max(80, v.w * f));
      const nh = Math.min(MAX_H, Math.max(150, v.h * f));
      return {
        x: Math.max(MIN_X, Math.min(SVG_W + Math.abs(MIN_X) - nw, v.x + (v.w - nw) * mx)),
        y: Math.max(MIN_Y, Math.min(SVG_H + Math.abs(MIN_Y) - nh, v.y + (v.h - nh) * my)),
        w: nw, h: nh
      };
    });
  }, []);

  useEffect(() => {
    const s = svgRef.current;
    if (s) s.addEventListener("wheel", onWheel, { passive: false });
    return () => { if (s) s.removeEventListener("wheel", onWheel); };
  }, [onWheel]);

  // Pan
  const onPanDown = (e) => {
    if (e.target.closest("[data-plot]")) return;
    setIsPan(true);
    setPanO({ x: e.clientX, y: e.clientY, vb: { ...vb } });
  };
  const onPanMove = (e) => {
    if (!isPan || !panO) return;
    const svg = svgRef.current;
    if (!svg) return;
    const r = svg.getBoundingClientRect();
    const dx = (e.clientX - panO.x) * (vb.w / r.width);
    const dy = (e.clientY - panO.y) * (vb.h / r.height);
    setVb({
      ...panO.vb,
      x: Math.max(MIN_X, Math.min(SVG_W + Math.abs(MIN_X) - vb.w, panO.vb.x - dx)),
      y: Math.max(MIN_Y, Math.min(SVG_H + Math.abs(MIN_Y) - vb.h, panO.vb.y - dy)),
    });
  };
  const onPanUp = () => { setIsPan(false); setPanO(null); };

  // Actions
  const zoomToPlot = (plot) => {
    const zw = 162, zh = 300;
    setVb({
      x: Math.max(MIN_X, Math.min(SVG_W + Math.abs(MIN_X) - zw, plot.c[0] - zw / 2)),
      y: Math.max(MIN_Y, Math.min(SVG_H + Math.abs(MIN_Y) - zh, plot.c[1] - zh / 2)),
      w: zw, h: zh
    });
  };
  const resetView = () => { setVb({ x: -110, y: -100, w: SVG_W * 1.5, h: SVG_H * 1.3 }); setSel(null); };
  const toggleSt = (s) => {
    setActiveStatuses(prev => {
      const n = new Set(prev);
      if (n.has(s)) n.delete(s); else n.add(s);
      return n;
    });
  };

  const selPlot = sel ? PLOTS.find(p => p.id === sel) : null;
  const hovPlot = hov ? PLOTS.find(p => p.id === hov) : null;
  const zoomLevel = SVG_W / vb.w;

  // Search and go to plot
  const searchAndGo = () => {
    const num = parseInt(search, 10);
    const found = PLOTS.find(p => p.id === num);
    if (found) {
      setSel(found.id);
      zoomToPlot(found);
      setInfoPanel(null);
    }
  };

  // ═══ STYLES ═══
  const S = {
    root: { width: "100%", height: "100vh", background: "#232323", position: "relative", overflow: "hidden", fontFamily: "'Outfit', 'Manrope', system-ui, sans-serif", color: "#e2e8f0" },
    pill: (active) => ({ padding: "8px 18px", borderRadius: 30, border: "1px solid " + (active ? "#ffffff30" : "#ffffff15"), background: active ? "#ffffff15" : "#00000040", backdropFilter: "blur(12px)", cursor: "pointer", fontSize: 13, fontWeight: 500, color: active ? "#fff" : "#94a3b8", display: "flex", alignItems: "center", gap: 8, transition: "all .2s", userSelect: "none" }),
    toggle: (on) => ({ width: 36, height: 20, borderRadius: 10, background: on ? "#4ade80" : "#334155", position: "relative", cursor: "pointer", transition: "background .2s", flexShrink: 0 }),
    toggleDot: (on) => ({ width: 16, height: 16, borderRadius: 8, background: "#fff", position: "absolute", top: 2, left: on ? 18 : 2, transition: "left .2s" }),
    bottomBtn: (active) => ({ padding: "10px 20px", borderRadius: 12, background: active ? "#ffffff20" : "#00000060", border: "1px solid #ffffff15", backdropFilter: "blur(12px)", color: active ? "#fff" : "#94a3b8", fontSize: 13, fontWeight: 500, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, transition: "all .2s" }),
    iconBtn: { width: 42, height: 42, borderRadius: 12, background: "#00000060", border: "1px solid #ffffff15", backdropFilter: "blur(12px)", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", color: "#94a3b8", fontSize: 16 },
  };

  return (
    <div style={S.root}>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

      {/* ── SVG MAP ── */}
      <svg
        ref={svgRef}
        viewBox={`${vb.x} ${vb.y} ${vb.w} ${vb.h}`}
        style={{ width: "100%", height: "100%", cursor: isPan ? "grabbing" : "grab", position: "absolute", inset: 0 }}
        onPointerDown={onPanDown} onPointerMove={onPanMove} onPointerUp={onPanUp} onPointerLeave={onPanUp}
      >
        <defs>
          <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ffffff04" strokeWidth=".3" />
          </pattern>
          <filter id="glow"><feGaussianBlur stdDeviation="3" result="b" /><feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
          <filter id="selGlow"><feGaussianBlur stdDeviation="5" result="b" /><feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
        </defs>

        <rect x="0" y="0" width={SVG_W} height={SVG_H} fill="#232323" />
        <rect x="0" y="0" width={SVG_W} height={SVG_H} fill="url(#grid)" />

        {/* Boundary */}
        <polygon points={p2s(BOUNDARY)} fill="none" stroke="#000000" strokeWidth="0.8" />

        {/* Infrastructure */}
        {showInfra && INFRA.map((inf, i) => (
          <g key={i}>
            <polygon points={p2s(inf.pts)} fill={inf.type === "Internal Roads" ? "#515151" : inf.color} stroke="#000000" strokeWidth={inf.type === "Internal Roads" ? 0.3 : 0.5} />
            {inf.type !== "Internal Roads" && zoomLevel > 1.2 && (
              <g>
                <text x={inf.c[0]} y={inf.c[1] - 3} textAnchor="middle" fontSize="9" style={{ pointerEvents: "none" }}>{inf.icon}</text>
                <text x={inf.c[0]} y={inf.c[1] + 8} textAnchor="middle" fill="#fff" fontSize="4" fontFamily="Outfit" fontWeight="600" opacity=".9" style={{ pointerEvents: "none" }}>{inf.type}</text>
              </g>
            )}
          </g>
        ))}

        {/* Road Labels */}
        {zoomLevel > 1.0 && (
          <g opacity=".5" style={{ pointerEvents: "none" }}>
            <text x="130" y="440" textAnchor="middle" fill="#fff" fontSize="4" fontFamily="Outfit" fontWeight="500" transform="rotate(-74, 130, 440)">7.5 Meter Road</text>
            <text x="245" y="465" textAnchor="middle" fill="#fff" fontSize="4" fontFamily="Outfit" fontWeight="500" transform="rotate(16, 245, 465)">6 Meter Road</text>
            <text x="180" y="240" textAnchor="middle" fill="#fff" fontSize="4" fontFamily="Outfit" fontWeight="500" transform="rotate(16, 180, 240)">9 Meter Road</text>
          </g>
        )}

        {/* Plots */}
        {PLOTS.map(p => {
          const vis = visIds.has(p.id);
          const isSel = sel === p.id;
          const isHov = hov === p.id;
          const rot = plotRotation(p.e);

          return (
            <g key={p.id} data-plot={p.id} style={{ cursor: "pointer" }}
              onClick={() => { setSel(p.id); zoomToPlot(p); setInfoPanel(null); }}
              onPointerEnter={() => setHov(p.id)}
              onPointerLeave={() => setHov(null)}
            >
              <polygon
                points={p2s(p.pts)}
                fill={vis ? (isSel ? "#3B9AE8" : "#CFC4AB") : "#CFC4AB20"}
                stroke="#000000"
                strokeWidth={isSel ? 2 : isHov ? 2.2 : 2}
                opacity={vis ? 1 : .15}
                style={{ transition: "fill .15s, opacity .15s" }}
              />

              {/* ── UNSELECTED: number only, always visible, 1.5x ── */}
              {vis && !isSel && (
                <text x={p.c[0]} y={p.c[1]} textAnchor="middle" dominantBaseline="middle"
                  fill="#1a1a1a" fontSize="6.75"
                  fontFamily="Outfit" fontWeight="700"
                  transform={`rotate(${rot}, ${p.c[0]}, ${p.c[1]})`}
                  style={{ pointerEvents: "none" }}>
                  {p.id}
                </text>
              )}

              {/* ── SELECTED: text hierarchy ── */}
              {isSel && (
                <g transform={`rotate(${rot}, ${p.c[0]}, ${p.c[1]})`} style={{ pointerEvents: "none" }}>
                  <text x={p.c[0]} y={p.c[1] - 3} textAnchor="middle" dominantBaseline="middle"
                    fill="#fff" fontSize="9" fontFamily="Outfit" fontWeight="700">{p.id}</text>
                  <text x={p.c[0]} y={p.c[1] + 5} textAnchor="middle" dominantBaseline="middle"
                    fill="#ffffffb0" fontSize="3.2" fontFamily="Outfit" fontWeight="400">{p.am} m²</text>
                  <text x={p.c[0]} y={p.c[1] + 10} textAnchor="middle" dominantBaseline="middle"
                    fill="#ffffffd0" fontSize="4" fontFamily="Outfit" fontWeight="600">{p.a} sq yd</text>
                </g>
              )}

              {/* ── SELECTED: dimensions OUTSIDE ── */}
              {isSel && p.e.map((edge, ei) => {
                const off = -6;
                const rd = edge.a * Math.PI / 180;
                const perpX = -Math.sin(rd);
                const perpY = Math.cos(rd);
                const nx = perpX * off;
                const ny = perpY * off;
                const pi = p.pts[ei];
                const pj = p.pts[(ei + 1) % p.pts.length];
                const tk = 3;
                const tx = perpX * tk;
                const ty = perpY * tk;
                const tOff = off - 3.5;
                const tnx = perpX * tOff;
                const tny = perpY * tOff;
                const tAng = (edge.a > 90 || edge.a < -90) ? edge.a + 180 : edge.a;
                return (
                  <g key={ei} style={{ pointerEvents: "none" }}>
                    <line x1={pi[0] + nx} y1={pi[1] + ny} x2={pj[0] + nx} y2={pj[1] + ny}
                      stroke="#ffffffb0" strokeWidth=".4" strokeDasharray="1.2 1.2" />
                    <line x1={pi[0] + nx - tx * .4} y1={pi[1] + ny - ty * .4}
                          x2={pi[0] + nx + tx * .4} y2={pi[1] + ny + ty * .4}
                      stroke="#ffffffb0" strokeWidth=".4" />
                    <line x1={pj[0] + nx - tx * .4} y1={pj[1] + ny - ty * .4}
                          x2={pj[0] + nx + tx * .4} y2={pj[1] + ny + ty * .4}
                      stroke="#ffffffb0" strokeWidth=".4" />
                    <line x1={pi[0]} y1={pi[1]} x2={pi[0] + nx} y2={pi[1] + ny}
                      stroke="#ffffff50" strokeWidth=".25" strokeDasharray="1 1" />
                    <line x1={pj[0]} y1={pj[1]} x2={pj[0] + nx} y2={pj[1] + ny}
                      stroke="#ffffff50" strokeWidth=".25" strokeDasharray="1 1" />
                    <text x={edge.mx + tnx} y={edge.my + tny}
                      textAnchor="middle" dominantBaseline="middle"
                      fill="#ffffffc0" fontSize="3" fontFamily="Outfit" fontWeight="500"
                      transform={`rotate(${tAng}, ${edge.mx + tnx}, ${edge.my + tny})`}>
                      {edge.l} m
                    </text>
                  </g>
                );
              })}
            </g>
          );
        })}

        {/* Entry marker */}
        {zoomLevel > .9 && (
          <g style={{ pointerEvents: "none" }}>
            <rect x="5" y="750" width="40" height="14" rx="3" fill="#4ade8030" stroke="#4ade8050" strokeWidth=".5" />
            <text x="25" y="758.5" textAnchor="middle" fill="#4ade80" fontSize="4.5" fontFamily="Outfit" fontWeight="600">ENTRY</text>
          </g>
        )}
      </svg>

      {/* ── TOP LEFT: Logo + Compass ── */}
      <div style={{ position: "absolute", top: 16, left: 16, display: "flex", flexDirection: "column", gap: 12, zIndex: 10 }}>
        <div style={{ background: "#00000080", backdropFilter: "blur(12px)", borderRadius: 12, padding: "10px 14px", border: "1px solid #ffffff10" }}>
          <div style={{ fontSize: 10, letterSpacing: "0.1em", color: "#4ade80", fontWeight: 600, fontFamily: "Outfit" }}>YOUR PROJECT</div>
          <div style={{ fontSize: 18, fontWeight: 700, fontFamily: "Outfit", lineHeight: 1.2 }}>LOGO HERE</div>
        </div>
        <div style={{ background: "#00000080", backdropFilter: "blur(12px)", borderRadius: 12, width: 42, height: 42, display: "flex", alignItems: "center", justifyContent: "center", border: "1px solid #ffffff10" }}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L15 10H9L12 2Z" fill="#f87171" />
            <path d="M12 22L9 14H15L12 22Z" fill="#ffffff60" />
            <text x="12" y="8" textAnchor="middle" fill="#f87171" fontSize="5" fontWeight="bold" fontFamily="Outfit">N</text>
          </svg>
        </div>
      </div>

      {/* ── TOP RIGHT: Share ── */}
      <div style={{ position: "absolute", top: 16, right: 16, zIndex: 10 }}>
        <div style={S.iconBtn} onClick={() => { if (navigator.clipboard) navigator.clipboard.writeText(window.location.href); }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8" /><polyline points="16 6 12 2 8 6" /><line x1="12" y1="2" x2="12" y2="15" /></svg>
        </div>
      </div>

      {/* ── RIGHT SIDE: View toggles ── */}
      <div style={{ position: "absolute", right: 16, bottom: 140, display: "flex", flexDirection: "column", gap: 8, zIndex: 10 }}>
        <div style={S.iconBtn} title="Map View">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6" /><line x1="8" y1="2" x2="8" y2="18" /><line x1="16" y1="6" x2="16" y2="22" /></svg>
        </div>
        <div style={S.iconBtn} title="3D View (Coming Soon)" onClick={() => {}}>
          <span style={{ fontFamily: "Outfit", fontWeight: 700, fontSize: 13 }}>3D</span>
        </div>
        <div style={{ ...S.iconBtn, background: sel ? "#4ade8020" : "#00000060", borderColor: sel ? "#4ade8040" : "#ffffff15" }} title="Reset View" onClick={resetView}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></svg>
        </div>
      </div>

      {/* ── BOTTOM: Toggles + Search + Action Bar ── */}
      <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, padding: "0 16px 16px", display: "flex", flexDirection: "column", gap: 10, zIndex: 10, pointerEvents: "none" }}>

        {/* Status dropdown */}
        {statusFilter && (
          <div style={{ pointerEvents: "auto", background: "#00000090", backdropFilter: "blur(16px)", borderRadius: 14, padding: 12, border: "1px solid #ffffff10", display: "flex", flexWrap: "wrap", gap: 8, alignSelf: "flex-end" }}>
            {ALL_STATUSES.map(s => {
              const on = activeStatuses.has(s);
              return (
                <div key={s} onClick={() => toggleSt(s)} style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", opacity: on ? 1 : .35, transition: "opacity .2s" }}>
                  <div style={{ width: 10, height: 10, borderRadius: 3, background: STATUS_CFG[s].color }} />
                  <span style={{ fontSize: 12, fontFamily: "Outfit", fontWeight: 500 }}>{STATUS_CFG[s].label}</span>
                  <span style={{ fontSize: 11, color: "#ffffff60", fontFamily: "Outfit" }}>({stats[s]})</span>
                </div>
              );
            })}
          </div>
        )}

        {/* Toggle pills row */}
        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", pointerEvents: "auto" }}>
          <div style={S.pill(typesFilter)} onClick={() => setTypesFilter(!typesFilter)}>
            Types <div style={S.toggle(typesFilter)}><div style={S.toggleDot(typesFilter)} /></div>
          </div>
          <div style={S.pill(statusFilter)} onClick={() => setStatusFilter(!statusFilter)}>
            Status <div style={S.toggle(statusFilter)}><div style={S.toggleDot(statusFilter)} /></div>
          </div>
        </div>

        {/* Search bar */}
        <div style={{ pointerEvents: "auto", display: "flex", background: "#00000070", backdropFilter: "blur(16px)", borderRadius: 14, padding: "10px 16px", border: "1px solid #ffffff12", alignItems: "center", gap: 10 }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" strokeWidth="2"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>
          <input
            type="text" placeholder="Search Plot" value={search}
            onChange={e => setSearch(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter") searchAndGo(); }}
            style={{ flex: 1, background: "transparent", border: "none", outline: "none", color: "#fff", fontSize: 14, fontFamily: "Outfit" }}
          />
          {search && (
            <div onClick={() => setSearch("")} style={{ cursor: "pointer", color: "#64748b", fontSize: 14, marginRight: 4 }}>✕</div>
          )}
          <div onClick={searchAndGo} style={{
            width: 32, height: 32, borderRadius: 8, background: search ? "#4ade8030" : "#ffffff08",
            border: "1px solid " + (search ? "#4ade8050" : "#ffffff10"),
            display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer",
            transition: "all .2s"
          }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={search ? "#4ade80" : "#64748b"} strokeWidth="2.5"><polyline points="9 18 15 12 9 6" /></svg>

        <div style={{ pointerEvents: "auto", display: "flex", gap: 8, justifyContent: "center" }}>
          <div style={S.bottomBtn(infoPanel === "gallery")} onClick={() => setInfoPanel(infoPanel === "gallery" ? null : "gallery")}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" /><circle cx="8.5" cy="8.5" r="1.5" /><polyline points="21 15 16 10 5 21" /></svg>
            Gallery
          </div>
          <div style={S.bottomBtn(infoPanel === "info")} onClick={() => setInfoPanel(infoPanel === "info" ? null : "info")}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></svg>
            Info
          </div>
          <div style={S.bottomBtn(infoPanel === "locate")} onClick={() => setInfoPanel(infoPanel === "locate" ? null : "locate")}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" /><circle cx="12" cy="10" r="3" /></svg>
            Locate
          </div>
        </div>
      </div>

      {/* ── SELECTED PLOT INFO OVERLAY ── */}
      {selPlot && (
        <div style={{
          position: "absolute", top: 16, left: "50%", transform: "translateX(-50%)",
          background: "#00000090", backdropFilter: "blur(20px)", borderRadius: 12,
          padding: "8px 14px", border: "1px solid #ffffff15", zIndex: 20,
          display: "flex", alignItems: "center", gap: 12,
        }}>
          <div style={{
            width: 32, height: 32, borderRadius: 8,
            background: "#3B9AE830",
            border: "1.5px solid #3B9AE8",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontFamily: "Outfit", fontWeight: 700, fontSize: 14, color: "#fff"
          }}>{sel}</div>

          <div>
            <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "Outfit" }}>{selPlot.a} sq yd</div>
            <div style={{ fontSize: 10, color: "#ffffff50", fontFamily: "Outfit" }}>{selPlot.am} m² · {selPlot.tp}</div>
          </div>

          <div style={{ width: 1, height: 28, background: "#ffffff15" }} />

          <div style={{ display: "flex", gap: 4 }}>
            {selPlot.e.map((edge, i) => (
              <div key={i} style={{ background: "#ffffff08", borderRadius: 6, padding: "2px 8px", border: "1px solid #ffffff10" }}>
                <div style={{ fontSize: 12, fontWeight: 600, fontFamily: "Outfit" }}>{edge.l}<span style={{ fontSize: 9, color: "#ffffff50" }}>m</span></div>
              </div>
            ))}
          </div>

          <div style={{ width: 1, height: 28, background: "#ffffff15" }} />

          <div style={{
            padding: "3px 10px", borderRadius: 6,
            background: STATUS_CFG[statuses[sel]].color + "20",
            color: STATUS_CFG[statuses[sel]].color,
            fontSize: 11, fontWeight: 600, fontFamily: "Outfit"
          }}>
            {STATUS_CFG[statuses[sel]].label}
          </div>

          <div onClick={() => { setSel(null); resetView(); }} style={{ cursor: "pointer", color: "#ffffff40", fontSize: 14, marginLeft: 2 }}>✕</div>
        </div>
      )}

      {/* ── HOVER TOOLTIP ── */}
      {hovPlot && !sel && visIds.has(hovPlot.id) && (
        <div style={{
          position: "absolute", top: 16, left: "50%", transform: "translateX(-50%)",
          background: "#00000090", backdropFilter: "blur(16px)", borderRadius: 12,
          padding: "8px 16px", border: "1px solid #ffffff12", zIndex: 15,
          display: "flex", alignItems: "center", gap: 12,
        }}>
          <span style={{ fontFamily: "Outfit", fontWeight: 700, fontSize: 16 }}>Plot {hovPlot.id}</span>
          <span style={{ fontSize: 13, color: "#ffffff70", fontFamily: "Outfit" }}>{hovPlot.a} sq yd</span>
          <div style={{ padding: "3px 10px", borderRadius: 6, background: STATUS_CFG[statuses[hovPlot.id]].color + "20", color: STATUS_CFG[statuses[hovPlot.id]].color, fontSize: 11, fontWeight: 600, fontFamily: "Outfit" }}>
            {STATUS_CFG[statuses[hovPlot.id]].label}
          </div>
        </div>
      )}

      {/* ── INFO PANELS (placeholders) ── */}
      {infoPanel && (
        <div style={{
          position: "absolute", bottom: 180, left: 16, right: 16,
          background: "#00000090", backdropFilter: "blur(20px)", borderRadius: 16,
          padding: 20, border: "1px solid #ffffff12", zIndex: 15,
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <span style={{ fontFamily: "Outfit", fontWeight: 600, fontSize: 16, textTransform: "capitalize" }}>{infoPanel}</span>
            <div onClick={() => setInfoPanel(null)} style={{ cursor: "pointer", color: "#ffffff50", fontSize: 14 }}>✕</div>
          </div>
          {infoPanel === "gallery" && (
            <div style={{ display: "flex", gap: 10, overflowX: "auto" }}>
              {[1, 2, 3, 4].map(i => (
                <div key={i} style={{ width: 140, height: 90, borderRadius: 10, background: "#ffffff08", border: "1px solid #ffffff10", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, color: "#ffffff30", fontSize: 12, fontFamily: "Outfit" }}>
                  Photo {i}
                </div>
              ))}
            </div>
          )}
          {infoPanel === "info" && (
            <div style={{ fontFamily: "Outfit", fontSize: 13, color: "#ffffff70", lineHeight: 1.8 }}>
              <div><strong style={{ color: "#fff" }}>Project:</strong> Your Project Name</div>
              <div><strong style={{ color: "#fff" }}>Total Area:</strong> 7,724.57 sq m</div>
              <div><strong style={{ color: "#fff" }}>Total Plots:</strong> 46</div>
              <div><strong style={{ color: "#fff" }}>Amenities:</strong> Clubhouse, Open Space, MSEB</div>
              <div><strong style={{ color: "#fff" }}>RERA No:</strong> [Add RERA number]</div>
            </div>
          )}
          {infoPanel === "locate" && (
            <div style={{ fontFamily: "Outfit", fontSize: 13, color: "#ffffff70", textAlign: "center", padding: "20px 0" }}>
              <div style={{ fontSize: 28, marginBottom: 8 }}>📍</div>
              <div style={{ marginBottom: 8 }}>Google Maps integration placeholder</div>
              <div style={{ padding: "8px 20px", borderRadius: 8, background: "#4ade8020", border: "1px solid #4ade8040", color: "#4ade80", display: "inline-block", cursor: "pointer", fontWeight: 600 }}>
                Open in Google Maps
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── THE DIMENSIONS BRANDING ── */}
      <a href="https://thedimensions.co" target="_blank" rel="noopener noreferrer"
        style={{
          position: "absolute", bottom: 16, right: 16, zIndex: 25,
          background: "#00000070", backdropFilter: "blur(12px)", borderRadius: 10,
          padding: "8px 14px", border: "1px solid #ffffff10",
          display: "flex", alignItems: "center", gap: 8,
          textDecoration: "none", cursor: "pointer", transition: "background .2s",
        }}
        onMouseEnter={e => e.currentTarget.style.background = "#00000090"}
        onMouseLeave={e => e.currentTarget.style.background = "#00000070"}
      >
        <div style={{ width: 24, height: 24, borderRadius: 6, background: "#ffffff15", border: "1px solid #ffffff20", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, color: "#fff", fontFamily: "Outfit" }}>
          D
        </div>
        <div>
          <div style={{ fontSize: 10, fontFamily: "Outfit", fontWeight: 600, color: "#ffffffc0", letterSpacing: "0.05em" }}>THE DIMENSIONS</div>
          <div style={{ fontSize: 8, fontFamily: "Outfit", color: "#ffffff50" }}>thedimensions.co</div>
        </div>
      </a>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<SpacerMap />);
</script>
</body>
</html>
