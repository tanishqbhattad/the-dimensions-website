const p2s = (pts) => pts.map(p => p[0] + "," + p[1]).join(" ");

function plotRotation(edges) {
  let best = 0, bestD = 999;
  for (const e of edges) {
    let a = ((e.a % 360) + 360) % 360;
    let d = Math.min(Math.abs(a), Math.abs(a - 180), Math.abs(a - 360));
    if (d < bestD) { bestD = d; best = e.a; }
  }
  while (best > 90) best -= 180;
  while (best < -90) best += 180;
  return best;
}

function initStatuses() {
  const m = {};
  PLOTS.forEach(p => {
    const r = Math.random();
    m[p.id] = r < 0.5 ? "Available" : r < 0.8 ? "Sold" : "Hold";
  });
  return m;
}

function initTypes() {
  const m = {};
  PLOTS.forEach(p => {
    const r = Math.random();
    m[p.id] = r < 0.25 ? "Platinum" : r < 0.6 ? "Gold" : "Silver";
  });
  return m;

function SpacerMap() {
  const [statuses, setStatuses] = useState(initStatuses);
  const [plotTypes] = useState(initTypes);
  const [sel, setSel] = useState(null);
  const [hov, setHov] = useState(null);
  const [search, setSearch] = useState("");
  const [showSearch, setShowSearch] = useState(false);
  const [statusFilter, setStatusFilter] = useState(false);
  const [typesFilter, setTypesFilter] = useState(false);
  const [activeStatuses, setActiveStatuses] = useState(new Set(ALL_STATUSES));
  const [activeTypes, setActiveTypes] = useState(new Set(ALL_TYPES));
  const [showInfra, setShowInfra] = useState(true);
  const [vb, setVb] = useState({ x: -56, y: 15, w: 600, h: 1080 });
  const [isPan, setIsPan] = useState(false);
  const [panO, setPanO] = useState(null);
  const [infoPanel, setInfoPanel] = useState(null); // 'gallery' | 'info' | 'locate' | null
  const [isMobile, setIsMobile] = useState(false);
  const svgRef = useRef(null);
  const lastTouchDist = useRef(null);
  const lastTouchCenter = useRef(null);

  // Detect mobile
  useEffect(() => {
    const check = () => setIsMobile(window.innerWidth < 768);
    check();
    window.addEventListener("resize", check);
    return () => window.removeEventListener("resize", check);
  }, []);

  // Max zoom-out bounds (125% more than content)
  const MAX_W = SVG_W * 2.25;
  const MAX_H = SVG_H * 2.25;
  const MIN_X = -(MAX_W - SVG_W) / 2;
  const MIN_Y = -(MAX_H - SVG_H) / 2;

  // Filtered plots
  const visIds = useMemo(() => {
    const s = new Set();
    PLOTS.forEach(p => {
      if (statusFilter && !activeStatuses.has(statuses[p.id])) return;
      if (typesFilter && !activeTypes.has(plotTypes[p.id])) return;
      s.add(p.id);
    });
    return s;
  }, [statuses, activeStatuses, statusFilter, plotTypes, activeTypes, typesFilter]);

  // Stats
  const stats = useMemo(() => {
    const s = {};
    ALL_STATUSES.forEach(k => { s[k] = 0; });
    Object.values(statuses).forEach(k => { s[k]++; });
    return s;
  }, [statuses]);

  const typeStats = useMemo(() => {
    const s = {};
    ALL_TYPES.forEach(k => { s[k] = 0; });
    Object.values(plotTypes).forEach(k => { s[k]++; });
    return s;
  }, [plotTypes]);

  // Zoom
  const onWheel = useCallback((e) => {
    e.preventDefault();
    const svg = svgRef.current;
    if (!svg) return;
    const rect = svg.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / rect.width;
    const my = (e.clientY - rect.top) / rect.height;
    const f = e.deltaY > 0 ? 1.12 : 0.89;
    setVb(v => {
      const nw = Math.min(MAX_W, Math.max(40, v.w * f));
      const nh = Math.min(MAX_H, Math.max(75, v.h * f));
      return {
        x: Math.max(MIN_X, Math.min(SVG_W + Math.abs(MIN_X) - nw, v.x + (v.w - nw) * mx)),
        y: Math.max(MIN_Y, Math.min(SVG_H + Math.abs(MIN_Y) - nh, v.y + (v.h - nh) * my)),
        w: nw, h: nh
      };
    });
  }, []);

  useEffect(() => {
    const s = svgRef.current;
    if (s) s.addEventListener("wheel", onWheel, { passive: false });
    return () => { if (s) s.removeEventListener("wheel", onWheel); };
  }, [onWheel]);

  // Touch pinch-to-zoom
  const onTouchStart = useCallback((e) => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      lastTouchDist.current = Math.hypot(dx, dy);
      lastTouchCenter.current = {
        x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
        y: (e.touches[0].clientY + e.touches[1].clientY) / 2
      };
    }
  }, []);

  const onTouchMove = useCallback((e) => {
    if (e.touches.length === 2 && lastTouchDist.current) {
      e.preventDefault();
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.hypot(dx, dy);
      const scale = lastTouchDist.current / dist;
      const svg = svgRef.current;
      if (!svg) return;
      const rect = svg.getBoundingClientRect();
      const cx = (lastTouchCenter.current.x - rect.left) / rect.width;
      const cy = (lastTouchCenter.current.y - rect.top) / rect.height;
      setVb(v => {
        const nw = Math.min(MAX_W, Math.max(40, v.w * scale));
        const nh = Math.min(MAX_H, Math.max(75, v.h * scale));
        return {
          x: Math.max(MIN_X, Math.min(SVG_W + Math.abs(MIN_X) - nw, v.x + (v.w - nw) * cx)),
          y: Math.max(MIN_Y, Math.min(SVG_H + Math.abs(MIN_Y) - nh, v.y + (v.h - nh) * cy)),
          w: nw, h: nh
        };
      });
      lastTouchDist.current = dist;
    }
  }, []);

  const onTouchEnd = useCallback(() => {
    lastTouchDist.current = null;
    lastTouchCenter.current = null;
  }, []);

  useEffect(() => {
    const s = svgRef.current;
    if (!s) return;
    s.addEventListener("touchstart", onTouchStart, { passive: false });
    s.addEventListener("touchmove", onTouchMove, { passive: false });
    s.addEventListener("touchend", onTouchEnd);
    return () => {
      s.removeEventListener("touchstart", onTouchStart);
      s.removeEventListener("touchmove", onTouchMove);
      s.removeEventListener("touchend", onTouchEnd);
    };
  }, [onTouchStart, onTouchMove, onTouchEnd]);

  // Pan
  const onPanDown = (e) => {
    if (e.target.closest("[data-plot]")) return;
    setIsPan(true);
    setPanO({ x: e.clientX, y: e.clientY, vb: { ...vb } });
  };
  const onPanMove = (e) => {
    if (!isPan || !panO) return;
    const svg = svgRef.current;
    if (!svg) return;
    const r = svg.getBoundingClientRect();
    const dx = (e.clientX - panO.x) * (vb.w / r.width);
    const dy = (e.clientY - panO.y) * (vb.h / r.height);
    setVb({
      ...panO.vb,
      x: Math.max(MIN_X, Math.min(SVG_W + Math.abs(MIN_X) - vb.w, panO.vb.x - dx)),
      y: Math.max(MIN_Y, Math.min(SVG_H + Math.abs(MIN_Y) - vb.h, panO.vb.y - dy)),
    });
  };
  const onPanUp = (e) => {
    // If pointer barely moved, it's a click on blank area → deselect
    if (isPan && panO && Math.abs(e.clientX - panO.x) < 4 && Math.abs(e.clientY - panO.y) < 4) {
      setSel(null);
    }
    setIsPan(false);
    setPanO(null);
  };

  // Actions
  const zoomToPlot = (plot) => {
    const zw = 62, zh = 115;
    setVb({
      x: Math.max(MIN_X, Math.min(SVG_W + Math.abs(MIN_X) - zw, plot.c[0] - zw / 2)),
      y: Math.max(MIN_Y, Math.min(SVG_H + Math.abs(MIN_Y) - zh, plot.c[1] - zh / 2)),
      w: zw, h: zh
    });
  };
  const resetView = () => { setVb({ x: -56, y: 15, w: 600, h: 1080 }); setSel(null); };
  const toggleSt = (s) => {
    setActiveStatuses(prev => {
      const n = new Set(prev);
      if (n.has(s)) n.delete(s); else n.add(s);
      return n;
    });
  };
  const toggleTp = (t) => {
    setActiveTypes(prev => {
      const n = new Set(prev);
      if (n.has(t)) n.delete(t); else n.add(t);
      return n;
    });
  };
  // Mutual exclusivity: turning one on turns the other off
  const toggleStatusFilter = () => {
    if (!statusFilter) { setStatusFilter(true); setTypesFilter(false); }
    else setStatusFilter(false);
  };
  const toggleTypesFilter = () => {
    if (!typesFilter) { setTypesFilter(true); setStatusFilter(false); }
    else setTypesFilter(false);
  };

  const selPlot = sel ? PLOTS.find(p => p.id === sel) : null;
  const hovPlot = hov ? PLOTS.find(p => p.id === hov) : null;
  const zoomLevel = SVG_W / vb.w;

  // Search and go to plot
  const searchAndGo = () => {
    const num = parseInt(search, 10);
    const found = PLOTS.find(p => p.id === num);
    if (found) {
      setSel(found.id);
      zoomToPlot(found);
      setInfoPanel(null);
    }
  };

  // ═══ STYLES ═══
  const m = isMobile;
  const S = {
    root: { width: "100%", height: "100vh", background: "#232323", position: "relative", overflow: "hidden", fontFamily: "'Outfit', 'Manrope', system-ui, sans-serif", color: "#e2e8f0", touchAction: "none" },
    pill: (active) => ({ padding: m ? "6px 12px" : "8px 18px", borderRadius: 30, border: "1px solid " + (active ? "#ffffff30" : "#ffffff15"), background: active ? "#ffffff15" : "#00000040", backdropFilter: "blur(12px)", cursor: "pointer", fontSize: m ? 11 : 13, fontWeight: 500, color: active ? "#fff" : "#94a3b8", display: "flex", alignItems: "center", gap: 6, transition: "all .2s", userSelect: "none" }),
    toggle: (on) => ({ width: m ? 30 : 36, height: m ? 16 : 20, borderRadius: 10, background: on ? "#4ade80" : "#334155", position: "relative", cursor: "pointer", transition: "background .2s", flexShrink: 0 }),
    toggleDot: (on) => ({ width: m ? 12 : 16, height: m ? 12 : 16, borderRadius: 8, background: "#fff", position: "absolute", top: 2, left: on ? (m ? 16 : 18) : 2, transition: "left .2s" }),
    bottomBtn: (active) => ({ padding: m ? "8px 14px" : "10px 20px", borderRadius: 12, background: active ? "#ffffff20" : "#00000060", border: "1px solid #ffffff15", backdropFilter: "blur(12px)", color: active ? "#fff" : "#94a3b8", fontSize: m ? 11 : 13, fontWeight: 500, cursor: "pointer", display: "flex", alignItems: "center", gap: 5, transition: "all .2s", flex: m ? 1 : "none", justifyContent: "center" }),
    iconBtn: { width: m ? 36 : 42, height: m ? 36 : 42, borderRadius: m ? 10 : 12, background: "#00000060", border: "1px solid #ffffff15", backdropFilter: "blur(12px)", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", color: "#94a3b8", fontSize: m ? 14 : 16 },
  };

  return (
    <div style={S.root}>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

      {/* ── SVG MAP ── */}
      <svg
        ref={svgRef}
        viewBox={`${vb.x} ${vb.y} ${vb.w} ${vb.h}`}
        style={{ width: "100%", height: "100%", cursor: isPan ? "grabbing" : "grab", position: "absolute", inset: 0 }}
        onPointerDown={onPanDown} onPointerMove={onPanMove} onPointerUp={onPanUp} onPointerLeave={onPanUp}
      >
        <defs>
          <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ffffff04" strokeWidth=".3" />
          </pattern>
          <filter id="glow"><feGaussianBlur stdDeviation="3" result="b" /><feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
          <filter id="selGlow"><feGaussianBlur stdDeviation="5" result="b" /><feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
          <linearGradient id="entryGrad" x1="0" y1="1" x2="0" y2="0" gradientTransform="rotate(16, 0.5, 0.5)">
            <stop offset="0%" stopColor="#4ade80" stopOpacity="0.6" />
            <stop offset="100%" stopColor="#4ade80" stopOpacity="0" />
          </linearGradient>
        </defs>

        <rect x="0" y="0" width={SVG_W} height={SVG_H} fill="#232323" />
        <rect x="0" y="0" width={SVG_W} height={SVG_H} fill="url(#grid)" />

        {/* Boundary */}
        <polygon points={p2s(BOUNDARY)} fill="none" stroke="#000000" strokeWidth="0.8" opacity={sel ? 0.5 : 1} style={{ transition: "opacity .3s" }} />

        {/* Surrounding Context */}
        <g opacity={sel ? 0.3 : 0.8} style={{ pointerEvents: "none", transition: "opacity .3s" }}>
          {CONTEXT.map((ln, i) => (
            <line key={i} x1={ln.s[0]} y1={ln.s[1]} x2={ln.e[0]} y2={ln.e[1]}
              stroke="#ffffff60" strokeWidth="1" strokeDasharray="4 3" />
          ))}
        </g>

        {/* Infrastructure */}
        <g opacity={sel ? 0.5 : 1} style={{ transition: "opacity .3s" }}>
        {showInfra && INFRA.map((inf, i) => (
          <g key={i}>
            {inf.path ? (
              <path d={inf.path} fill={inf.type === "Internal Roads" ? "#515151" : inf.color} stroke="#000000" strokeWidth={inf.type === "Internal Roads" ? 0.3 : 0.5} />
            ) : (
              <polygon points={p2s(inf.pts)} fill={inf.type === "Internal Roads" ? "#515151" : inf.color} stroke="#000000" strokeWidth={inf.type === "Internal Roads" ? 0.3 : 0.5} />
            )}
            {inf.type !== "Internal Roads" && zoomLevel > 1.2 && (
              <g>
                <text x={inf.c[0]} y={inf.c[1] - 3} textAnchor="middle" fontSize="9" style={{ pointerEvents: "none" }}>{inf.icon}</text>
                <text x={inf.c[0]} y={inf.c[1] + 8} textAnchor="middle" fill="#fff" fontSize="4" fontFamily="Outfit" fontWeight="600" opacity=".9" style={{ pointerEvents: "none" }}>{inf.type}</text>
              </g>
            )}
          </g>
        ))}
        </g>

        {/* Road Labels from DXF */}
        <g opacity={sel ? 0.25 : 0.6} style={{ pointerEvents: "none", transition: "opacity .3s" }}>
          {ROAD_TEXTS.map((t, i) => {
            const isVertical = i === 3 || i === 4;
            const angle = isVertical ? -74 : 16;
            return (
              <text key={i} x={t.x} y={t.y} textAnchor="start" dominantBaseline="hanging"
                fill="#ffffffc0" fontSize="6" fontFamily="Outfit" fontWeight="500"
                transform={`rotate(${angle}, ${t.x}, ${t.y})`}>
                {t.text}
              </text>
            );
          })}
        </g>

        {/* Entrance */}
        <g opacity={sel ? 0.5 : 1} style={{ transition: "opacity .3s" }}>
          {typeof ENTRANCE_PATH !== 'undefined' ? (
            <path d={ENTRANCE_PATH} fill="url(#entryGrad)" stroke="none" />
          ) : (
            <polygon points={p2s(ENTRANCE)} fill="url(#entryGrad)" stroke="none" />
          )}
          <text x={ENTRANCE_C[0]} y={ENTRANCE_C[1] + 1}
                textAnchor="middle" dominantBaseline="middle"
                fill="#4ade80" fontSize="5" fontFamily="Outfit" fontWeight="700"
                transform={`rotate(16, ${ENTRANCE_C[0]}, ${ENTRANCE_C[1] + 1})`}
                style={{ pointerEvents: "none" }}>ENTRY</text>
        </g>

        {/* Plots */}
        {PLOTS.map(p => {
          const vis = visIds.has(p.id);
          const isSel = sel === p.id;
          const isHov = hov === p.id;
          const rot = plotRotation(p.e);

          // Determine fill color based on active filter
          let plotFill = "#CFC4AB";
          if (statusFilter && vis) {
            plotFill = STATUS_CFG[statuses[p.id]]?.color || "#CFC4AB";
          } else if (typesFilter && vis) {
            plotFill = TYPE_CFG[plotTypes[p.id]]?.color || "#CFC4AB";
          }

          return (
            <g key={p.id} data-plot={p.id} style={{ cursor: "pointer" }}
              onClick={() => { setSel(p.id); zoomToPlot(p); setInfoPanel(null); }}
              onPointerEnter={() => setHov(p.id)}
              onPointerLeave={() => setHov(null)}
            >
              {p.path ? (
                <path d={p.path}
                  fill={vis ? (isSel ? "#3B9AE8" : plotFill) : "#CFC4AB20"}
                  stroke="#000000"
                  strokeWidth={isSel ? 2 : isHov ? 2.2 : 2}
                  opacity={vis ? (sel && !isSel ? 0.5 : 1) : .15}
                  style={{ transition: "fill .3s, opacity .3s" }}
                />
              ) : (
                <polygon
                  points={p2s(p.pts)}
                  fill={vis ? (isSel ? "#3B9AE8" : plotFill) : "#CFC4AB20"}
                  stroke="#000000"
                  strokeWidth={isSel ? 2 : isHov ? 2.2 : 2}
                  opacity={vis ? (sel && !isSel ? 0.5 : 1) : .15}
                  style={{ transition: "fill .3s, opacity .3s" }}
                />
              )}

              {/* ── UNSELECTED: number only, always visible, 1.5x ── */}
              {vis && !isSel && (
                <text x={p.c[0]} y={p.c[1]} textAnchor="middle" dominantBaseline="middle"
                  fill={(statusFilter || typesFilter) ? "#fff" : "#1a1a1a"} fontSize="6.75"
                  fontFamily="Outfit" fontWeight="700"
                  opacity={sel ? 0.5 : 1}
                  stroke={(statusFilter || typesFilter) ? "#00000050" : "none"} strokeWidth={(statusFilter || typesFilter) ? ".5" : "0"} paintOrder="stroke"
                  transform={`rotate(${rot}, ${p.c[0]}, ${p.c[1]})`}
                  style={{ pointerEvents: "none", transition: "opacity .3s, fill .3s" }}>
                  {p.id}
                </text>
              )}

              {/* ── SELECTED: text hierarchy ── */}
              {isSel && (
                <g transform={`rotate(${rot}, ${p.c[0]}, ${p.c[1]})`} style={{ pointerEvents: "none" }}>
                  <text x={p.c[0]} y={p.c[1] - 2} textAnchor="middle" dominantBaseline="middle"
                    fill="#fff" fontSize="6.3" fontFamily="Outfit" fontWeight="700">{p.id}</text>
                  <text x={p.c[0]} y={p.c[1] + 4} textAnchor="middle" dominantBaseline="middle"
                    fill="#ffffffd0" fontSize="2.8" fontFamily="Outfit" fontWeight="600">{p.a} sq yd</text>
                </g>
              )}

              {/* ── SELECTED: dimensions rendered in separate layer below ── */}
            </g>
          );
        })}

        {/* ── DIMENSION LINES LAYER (on top of all plots) ── */}
        {sel && (() => {
          const p = PLOTS.find(pl => pl.id === sel);
          if (!p) return null;
          const corners = p.oc || p.pts;
          // Compute centroid from the corners used (not the filleted centroid)
          const ccx = corners.reduce((s,c) => s + c[0], 0) / corners.length;
          const ccy = corners.reduce((s,c) => s + c[1], 0) / corners.length;
          return p.e.map((edge, ei) => {
            const dist = 2.5;
            const pi = corners[ei];
            const pj = corners[(ei + 1) % corners.length];
            const edx = pj[0] - pi[0];
            const edy = pj[1] - pi[1];
            const cross = edx * (ccy - pi[1]) - edy * (ccx - pi[0]);
            let outX, outY;
            if (cross > 0) {
              const len = Math.hypot(edx, edy);
              outX = (edy / len) * dist;
              outY = (-edx / len) * dist;
            } else {
              const len = Math.hypot(edx, edy);
              outX = (-edy / len) * dist;
              outY = (edx / len) * dist;
            }
            const nx = outX;
            const ny = outY;
            const tk = 1.8;
            const outLen = Math.hypot(outX, outY);
            const uX = outX / outLen;
            const uY = outY / outLen;
            const tAng = (edge.a > 90 || edge.a < -90) ? edge.a + 180 : edge.a;
            return (
              <g key={ei} style={{ pointerEvents: "none" }}>
                <line x1={pi[0] + nx} y1={pi[1] + ny} x2={pj[0] + nx} y2={pj[1] + ny}
                  stroke="#ffffffb0" strokeWidth=".4" strokeDasharray="1.2 1.2" />
                <line x1={pi[0] + nx - uX * tk * .4} y1={pi[1] + ny - uY * tk * .4}
                      x2={pi[0] + nx + uX * tk * .4} y2={pi[1] + ny + uY * tk * .4}
                  stroke="#ffffffb0" strokeWidth=".4" />
                <line x1={pj[0] + nx - uX * tk * .4} y1={pj[1] + ny - uY * tk * .4}
                      x2={pj[0] + nx + uX * tk * .4} y2={pj[1] + ny + uY * tk * .4}
                  stroke="#ffffffb0" strokeWidth=".4" />
                <line x1={pi[0]} y1={pi[1]} x2={pi[0] + nx} y2={pi[1] + ny}
                  stroke="#ffffff50" strokeWidth=".25" strokeDasharray="1 1" />
                <line x1={pj[0]} y1={pj[1]} x2={pj[0] + nx} y2={pj[1] + ny}
                  stroke="#ffffff50" strokeWidth=".25" strokeDasharray="1 1" />
                <text x={edge.mx + nx} y={edge.my + ny}
                  textAnchor="middle" dominantBaseline="middle"
                  fill="#fff" fontSize="3" fontFamily="Outfit" fontWeight="600"
                  stroke="#232323" strokeWidth="2" paintOrder="stroke"
                  transform={`rotate(${tAng}, ${edge.mx + nx}, ${edge.my + ny})`}>
                  {edge.l} m
                </text>
              </g>
            );
          });
        })()}

      </svg>

      {/* ── TOP LEFT: Project Logo + North Compass ── */}
      {!(m && sel) && (
      <div style={{ position: "absolute", top: m ? 10 : 16, left: m ? 10 : 16, display: "flex", flexDirection: "column", gap: m ? 8 : 12, zIndex: 10 }}>
        <div style={{ background: "#00000080", backdropFilter: "blur(12px)", borderRadius: m ? 10 : 12, padding: m ? "4px 6px" : "6px 10px", border: "1px solid #ffffff10" }}>

      {/* ── LEFT SIDE: Types & Status toggles (fixed position, categories ABOVE) ── */}
      <div style={{ position: "absolute", left: m ? 10 : 16, bottom: m ? 110 : 140, zIndex: 10, display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 0 }}>
        {/* Categories dropdown - appears ABOVE the buttons */}
        {statusFilter && (
          <div style={{ marginBottom: 8, background: "#00000090", backdropFilter: "blur(16px)", borderRadius: 12, padding: 10, border: "1px solid #ffffff10", display: "flex", flexDirection: "column", gap: 5 }}>
            {ALL_STATUSES.map(s => {
              const on = activeStatuses.has(s);
              return (
                <div key={s} onClick={() => toggleSt(s)} style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", opacity: on ? 1 : .35, transition: "opacity .2s" }}>
                  <div style={{ width: 8, height: 8, borderRadius: 2, background: STATUS_CFG[s].color }} />
                  <span style={{ fontSize: 11, fontFamily: "Outfit", fontWeight: 500 }}>{STATUS_CFG[s].label}</span>
                  <span style={{ fontSize: 10, color: "#ffffff60", fontFamily: "Outfit" }}>({stats[s]})</span>
                </div>
              );
            })}
          </div>
        )}
        {typesFilter && (
          <div style={{ marginBottom: 8, background: "#00000090", backdropFilter: "blur(16px)", borderRadius: 12, padding: 10, border: "1px solid #ffffff10", display: "flex", flexDirection: "column", gap: 5 }}>
            {ALL_TYPES.map(t => {
              const on = activeTypes.has(t);
              return (
                <div key={t} onClick={() => toggleTp(t)} style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", opacity: on ? 1 : .35, transition: "opacity .2s" }}>
                  <div style={{ width: 8, height: 8, borderRadius: 2, background: TYPE_CFG[t].color }} />
                  <span style={{ fontSize: 11, fontFamily: "Outfit", fontWeight: 500 }}>{TYPE_CFG[t].label}</span>
                  <span style={{ fontSize: 10, color: "#ffffff60", fontFamily: "Outfit" }}>({typeStats[t]})</span>
                </div>
              );
            })}
          </div>
        )}
        {/* Toggle buttons - always at fixed position */}
        <div style={S.pill(typesFilter)} onClick={toggleTypesFilter}>
          Types <div style={S.toggle(typesFilter)}><div style={S.toggleDot(typesFilter)} /></div>
        </div>
        <div style={{ height: 8 }} />
        <div style={S.pill(statusFilter)} onClick={toggleStatusFilter}>
          Status <div style={S.toggle(statusFilter)}><div style={S.toggleDot(statusFilter)} /></div>
        </div>
      </div>

      {/* ── RIGHT SIDE: Share, Map, Home (HORIZONTAL) ── */}
      <div style={{ position: "absolute", right: m ? 10 : 16, bottom: m ? 110 : 140, display: "flex", flexDirection: "row", gap: m ? 6 : 8, zIndex: 10 }}>
        <div style={S.iconBtn} title="Share" onClick={() => { if (navigator.clipboard) navigator.clipboard.writeText(window.location.href); }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8" /><polyline points="16 6 12 2 8 6" /><line x1="12" y1="2" x2="12" y2="15" /></svg>
        </div>
        <div style={S.iconBtn} title="Map View">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6" /><line x1="8" y1="2" x2="8" y2="18" /><line x1="16" y1="6" x2="16" y2="22" /></svg>
        </div>
        <div style={{ ...S.iconBtn, background: sel ? "#4ade8020" : "#00000060", borderColor: sel ? "#4ade8040" : "#ffffff15" }} title="Reset View" onClick={resetView}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></svg>
        </div>
      </div>

      {/* ── BOTTOM: Search + Action Bar ── */}
      <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, padding: m ? "0 10px 10px" : "0 16px 16px", display: "flex", flexDirection: "column", gap: m ? 6 : 10, zIndex: 10, pointerEvents: "none" }}>

        {/* Search bar */}
        <div style={{ pointerEvents: "auto", display: "flex", background: "#00000070", backdropFilter: "blur(16px)", borderRadius: m ? 10 : 14, padding: m ? "7px 12px" : "10px 16px", border: "1px solid #ffffff12", alignItems: "center", gap: m ? 6 : 10 }}>
          <svg width={m ? 14 : 16} height={m ? 14 : 16} viewBox="0 0 24 24" fill="none" stroke="#64748b" strokeWidth="2"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>
          <input
            type="text" placeholder="Search Plot" value={search}
            onChange={e => setSearch(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter") searchAndGo(); }}
            style={{ flex: 1, background: "transparent", border: "none", outline: "none", color: "#fff", fontSize: m ? 13 : 14, fontFamily: "Outfit" }}
          />
          {search && (
            <div onClick={() => setSearch("")} style={{ cursor: "pointer", color: "#64748b", fontSize: 14, marginRight: 4 }}>✕</div>
          )}
          <div onClick={searchAndGo} style={{
            width: 32, height: 32, borderRadius: 8, background: search ? "#4ade8030" : "#ffffff08",
            border: "1px solid " + (search ? "#4ade8050" : "#ffffff10"),
            display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer",
            transition: "all .2s"
          }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={search ? "#4ade80" : "#64748b"} strokeWidth="2.5"><polyline points="9 18 15 12 9 6" /></svg>
          </div>
        </div>

        {/* Action bar */}
        <div style={{ pointerEvents: "auto", display: "flex", gap: 8, justifyContent: "center" }}>
          <div style={S.bottomBtn(infoPanel === "gallery")} onClick={() => setInfoPanel(infoPanel === "gallery" ? null : "gallery")}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" /><circle cx="8.5" cy="8.5" r="1.5" /><polyline points="21 15 16 10 5 21" /></svg>
            Gallery
          </div>
          <div style={S.bottomBtn(infoPanel === "info")} onClick={() => setInfoPanel(infoPanel === "info" ? null : "info")}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></svg>
            Info
          </div>
          <div style={S.bottomBtn(false)} onClick={() => window.open("https://maps.app.goo.gl/AF864pNhQb2HruK56", "_blank")}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" /><circle cx="12" cy="10" r="3" /></svg>
            Locate
          </div>
        </div>
      </div>

      {/* ── SELECTED PLOT INFO OVERLAY ── */}
      {selPlot && (
        <div style={{
          position: "absolute", top: m ? 10 : 16, left: m ? 10 : "50%", right: m ? 10 : "auto",
          transform: m ? "none" : "translateX(-50%)",
          background: "#00000090", backdropFilter: "blur(20px)", borderRadius: m ? 10 : 12,
          padding: m ? "8px 12px" : "10px 16px", border: "1px solid #ffffff15", zIndex: 20,
          display: "flex", alignItems: "center", gap: m ? 8 : 14, flexWrap: m ? "wrap" : "nowrap",
        }}>
          {/* Plot Number */}
          <div style={{ fontFamily: "Outfit", fontWeight: 700, fontSize: m ? 16 : 20, color: "#fff", minWidth: m ? 22 : 28, textAlign: "center" }}>{sel}</div>

          <div style={{ width: 1, height: m ? 24 : 32, background: "#ffffff15" }} />

          {/* Area */}
          <div>
            <div style={{ fontSize: m ? 13 : 15, fontWeight: 700, fontFamily: "Outfit" }}>{selPlot.a} sq yd</div>
            <div style={{ fontSize: m ? 9 : 10, color: "#ffffff50", fontFamily: "Outfit" }}>{selPlot.am} m²</div>
          </div>

          <div style={{ width: 1, height: m ? 24 : 32, background: "#ffffff15" }} />

          {/* Plot Type */}
          <div style={{ fontSize: m ? 10 : 12, fontFamily: "Outfit", fontWeight: 500, color: "#ffffffb0" }}>{selPlot.tp}</div>

          <div style={{ width: 1, height: m ? 24 : 32, background: "#ffffff15" }} />

          {/* Status */}
          <div style={{
            padding: m ? "3px 8px" : "4px 12px", borderRadius: 6,
            background: STATUS_CFG[statuses[sel]].color + "20",
            color: STATUS_CFG[statuses[sel]].color,
            fontSize: m ? 10 : 12, fontWeight: 600, fontFamily: "Outfit"
          }}>
            {STATUS_CFG[statuses[sel]].label}
          </div>

          <div onClick={() => { setSel(null); resetView(); }} style={{ cursor: "pointer", color: "#ffffff40", fontSize: m ? 12 : 14, marginLeft: m ? "auto" : 2 }}>✕</div>
        </div>
      )}

      {/* ── HOVER TOOLTIP (desktop only) ── */}
      {!isMobile && hovPlot && !sel && visIds.has(hovPlot.id) && (
        <div style={{
          position: "absolute", top: 16, left: "50%", transform: "translateX(-50%)",
          background: "#00000090", backdropFilter: "blur(16px)", borderRadius: 12,
          padding: "8px 16px", border: "1px solid #ffffff12", zIndex: 15,
          display: "flex", alignItems: "center", gap: 12,
        }}>
          <span style={{ fontFamily: "Outfit", fontWeight: 700, fontSize: 16 }}>Plot {hovPlot.id}</span>
          <span style={{ fontSize: 13, color: "#ffffff70", fontFamily: "Outfit" }}>{hovPlot.a} sq yd</span>
          <div style={{ padding: "3px 10px", borderRadius: 6, background: STATUS_CFG[statuses[hovPlot.id]].color + "20", color: STATUS_CFG[statuses[hovPlot.id]].color, fontSize: 11, fontWeight: 600, fontFamily: "Outfit" }}>
            {STATUS_CFG[statuses[hovPlot.id]].label}
          </div>
        </div>
      )}

      {/* ── INFO PANELS (placeholders) ── */}
      {infoPanel && (
        <div style={{
          position: "absolute", bottom: m ? 130 : 180, left: m ? 10 : 16, right: m ? 10 : 16,
          background: "#00000090", backdropFilter: "blur(20px)", borderRadius: m ? 12 : 16,
          padding: m ? 14 : 20, border: "1px solid #ffffff12", zIndex: 15,
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <span style={{ fontFamily: "Outfit", fontWeight: 600, fontSize: 16, textTransform: "capitalize" }}>{infoPanel}</span>
            <div onClick={() => setInfoPanel(null)} style={{ cursor: "pointer", color: "#ffffff50", fontSize: 14 }}>✕</div>
          </div>
          {infoPanel === "gallery" && (
            <div style={{ display: "flex", gap: 10, overflowX: "auto" }}>
              {[1, 2, 3, 4].map(i => (
                <div key={i} style={{ width: 140, height: 90, borderRadius: 10, background: "#ffffff08", border: "1px solid #ffffff10", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, color: "#ffffff30", fontSize: 12, fontFamily: "Outfit" }}>
                  Photo {i}
                </div>
              ))}
            </div>
          )}
          {infoPanel === "info" && (
            <div style={{ fontFamily: "Outfit", fontSize: 13, color: "#ffffff70", lineHeight: 1.8 }}>
              <div><strong style={{ color: "#fff" }}>Project:</strong> Your Project Name</div>
              <div><strong style={{ color: "#fff" }}>Total Area:</strong> 7,724.57 sq m</div>
              <div><strong style={{ color: "#fff" }}>Total Plots:</strong> 46</div>
              <div><strong style={{ color: "#fff" }}>Amenities:</strong> Clubhouse, Open Space, MSEB</div>
              <div><strong style={{ color: "#fff" }}>RERA No:</strong> [Add RERA number]</div>
            </div>
          )}
        </div>
      )}

    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<SpacerMap />);
</script>
</body>
</html>
